<!DOCTYPE html>
<html lang="en-GB" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MindGame 404 page. Return to the Rock Paper Scissors Lizard Spock game.">
    <meta name="author" content="Kamil Sterniczuk">
    <title>404 | MindGame</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="icon" href="assets/favicon/brain.png">
</head>

<body class="page error-page">

    <header class="site-header">
        <div class="brand-panel">
            <img src="assets/images/logo/brain.png" alt="MindGame logo" class="brand-icon">

            <div class="brand-text">
                <h1 class="site-title">MindGame</h1>
                <p class="site-subtitle">Rock · Paper · Scissors · Lizard · Spock</p>
            </div>
        </div>
    </header>

    <main class="app-container error-container">
        <section class="panel error-panel">
            <img
                src="assets/images/illustrations/astronaut.svg"
                alt=""
                class="error-illustration"
            >

            <p class="error-code">404</p>

            <h2 class="panel-title error-title">Lost in Space?</h2>

            <p class="panel-subtitle error-text">
                This page has drifted outside the MindGame arena.
                Return to the homepage to start a new match.
            </p>

            <a href="index.html" class="secondary-button error-button">
                Return to Homepage
            </a>
        </section>
    </main>

</body>

</html>
